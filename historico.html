<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Histórico de Transações</title>

  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background-color: #3a3a3a;
      color: #fff;
    }

    tr:nth-child(even) {
      background-color: #2a2a2a;
    }

    tr:nth-child(odd) {
      background-color: #242424;
    }

    .container {
      max-width: 700px;
      margin: 50px auto;
      background-color: #2c2c2c;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      color: white;
      font-family: Arial;
    }
  </style>
</head>

<body style="background-color: #1e1e1e;">

  <div class="container">
    <h1 style="text-align: center; font-size: 32px; margin-bottom: 20px;">
      📜 Histórico de Transações
    </h1>

    <table>
      <tr>
        <th>Data</th>
        <th>Tipo</th>
        <th>Valor</th>
        <th>Descrição</th>
      </tr>

      <!-- Linhas fictícias (podem ser removidas mais tarde) -->
      <tr>
        <td>2026-07-18</td>
        <td>Missão</td>
        <td style="color: #00ff7f;">+10 RC</td>
        <td>Cuidar da horta</td>
      </tr>

      <tr>
        <td>2026-07-17</td>
        <td>Compra</td>
        <td style="color: #ff6b6b;">-5 RC</td>
        <td>Sementes</td>
      </tr>

      <tr>
        <td>2026-07-16</td>
        <td>Bónus</td>
        <td style="color: #00ff7f;">+2 RC</td>
        <td>Presença diária</td>
      </tr>

    </table>

  </div>

</body>
</html>
