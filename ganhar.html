<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ganhar RaizCoin</title>

  <style>
    .container {
      max-width: 700px;
      margin: 50px auto;
      background-color: #2c2c2c;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      color: white;
      font-family: Arial;
    }

    .mission {
      background-color: #3a3a3a;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .mission-title {
      font-size: 22px;
      margin-bottom: 5px;
    }

    .mission-reward {
      color: #ffea00;
      font-size: 18px;
      margin-top: 5px;
    }
  </style>
</head>

<body style="background-color: #1e1e1e;">

  <div class="container">
    <h1 style="text-align: center; font-size: 32px; margin-bottom: 20px;">
      🌱 Ganhar RaizCoin
    </h1>

    <!-- Missões fictícias -->
    <div class="mission">
      <div class="mission-title">Regar as plantas</div>
      <div class="mission-reward">+3 RC</div>
    </div>

    <div class="mission">
      <div class="mission-title">Ajudar um colega</div>
      <div class="mission-reward">+5 RC</div>
    </div>

    <div class="mission">
      <div class="mission-title">Completar um desafio criativo</div>
      <div class="mission-reward">+8 RC</div>
    </div>

    <div class="mission">
      <div class="mission-title">Resolver um puzzle Mundo Raíz</div>
      <div class="mission-reward">+4 RC</div>
    </div>

  </div>

</body>
</html>
