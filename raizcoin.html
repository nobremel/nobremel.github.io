<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaizCoin</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Carregar Firebase -->
    <script src="firebase.js"></script>
</head>

<body>
    <header>
        <h1>RaizCoin</h1>
      <nav>
    <ul>
        <li><a href="carteira.html">Carteira</a></li>
        <li><a href="historico.html">Historico</a></li>
        <li><a href="ganhar.html">Ganhar</a></li>
    </ul>
</nav>

    </header>

    <main>
        <section class="saldo-section">
            <h2>Saldo atual: <span id="saldo">...</span></h2>
            <img src="raizcoin.svg" alt="RaizCoin" class="coin-image">
        </section>

        <section class="info-section">
            <h3>O que é RaizCoin?</h3>
            <p>RaizCoin é a moeda oficial do Mundo Raiz. Ganha completando missões, explorando espaços e participando em atividades.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Mundo Raiz</p>
    </footer>

    <!-- Script para ler saldo real do Firebase -->
    <script type="module">
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        async function carregarSaldo() {
            const db = window.db; // vem do firebase.js

            const ref = doc(db, "users", "mario");
            const snap = await getDoc(ref);

            if (snap.exists()) {
                const saldo = snap.data().saldo;
                document.getElementById("saldo").innerText = saldo + " RC";
            } else {
                document.getElementById("saldo").innerText = "Erro";
            }
        }

        carregarSaldo();
    </script>

</body>
</html>
